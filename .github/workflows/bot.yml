name: "Issue Comment Bot"

on:
  issues:
    types: [opened]        # Triggers when a new issue is created
  issue_comment:
    types: [created]       # Triggers on a new comment

# Grant write permissions so the bot can publish comments
permissions:
  issues: write

jobs:
  process-input:
    # Loop protection: do not react to comments from the bot itself
    if: github.event.sender.login != 'github-actions[bot]'
    runs-on: ubuntu-24.04

    steps:
      - name: Extract Author and Payload
        id: extract
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        # Depending on the event, the text is located in different variables
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "author=${{ github.event.comment.user.login }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            # Safe transfer of multi-line text
            echo "text<<EOF" >> $GITHUB_OUTPUT
            echo "$COMMENT_BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "author=${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "text<<EOF" >> $GITHUB_OUTPUT
            echo "$ISSUE_BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check Whitelist
        id: auth
        env:
          # Set the whitelist of accounts separated by commas (without spaces)
          WHITELIST: ${{ secrets.USERNAMES_WHITELIST }}
          AUTHOR: ${{ steps.extract.outputs.author }}
        run: |
          # Check if the author is in the whitelist
          if [[ ",$WHITELIST," == *",$AUTHOR,"* ]]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi

      - name: Reject Unauthorized User
        if: steps.auth.outputs.authorized == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ steps.extract.outputs.issue_number }}
          AUTHOR: ${{ steps.extract.outputs.author }}
        run: |
          gh issue comment $ISSUE --body "Sorry @$AUTHOR, you are not allowed to trigger the workflow."

      - name: Checkout Repository
        # The following steps are only executed for authorized users
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: steps.auth.outputs.authorized == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # Automatic caching
          cache-dependency-glob: "pyproject.toml"

      - name: Run Python Script
        if: steps.auth.outputs.authorized == 'true'
        id: run-script
        env:
          INPUT_PAYLOAD: ${{ steps.extract.outputs.text }}
          EARTHDATA_LOGIN: ${{ secrets.EARTHDATA_LOGIN }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
          EDL_TOKEN: ${{ secrets.EDL_TOKEN }}
          B2_SAVED_RESULTS_ROOTDIR: ${{ secrets.B2_SAVED_RESULTS_ROOTDIR }}
          EARTHDATA_MAX_NUM_REQUESTS_PER_SEC: ${{ vars.EARTHDATA_MAX_NUM_REQUESTS_PER_SEC }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          # The `uv run` command will automatically create an environment (.venv),
          # read pyproject.toml, install the required packages and run the script.
          uv run -m src.main > result.txt

          echo "script_result<<EOF" >> $GITHUB_OUTPUT
          cat result.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Detect the timestamped output directory created by the script
          OUTPUT_DIR=$(ls -d [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]_[0-9][0-9]-[0-9][0-9]-[0-9][0-9] 2>/dev/null | head -1)
          echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT

      - name: Upload Result Files
        if: steps.auth.outputs.authorized == 'true' && steps.run-script.outputs.output_dir != ''
        id: upload-results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ steps.run-script.outputs.output_dir }}
          path: ${{ steps.run-script.outputs.output_dir }}
          retention-days: 7

      - name: Post Success Comment
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ steps.extract.outputs.issue_number }}
          AUTHOR: ${{ steps.extract.outputs.author }}
          RESULT: ${{ steps.run-script.outputs.script_result }}
          ARTIFACT_URL: ${{ steps.upload-results.outputs.artifact-url }}
        run: |
          if [ -n "$ARTIFACT_URL" ]; then
            BODY="${RESULT}"$'\n\n'"**Download results:** [results archive](${ARTIFACT_URL}) _(available for 7 days, login required)_"
          else
            BODY="$RESULT"
          fi
          gh issue comment $ISSUE --body "$BODY"
